name: Deploy GitOps

on:
  workflow_run:
    workflows: [Build and Push Images]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Bump image tags
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          for f in gitops/apps/demo-api/values.yaml gitops/apps/demo-frontend/values.yaml; do
            sed -i "s|tag: .*|tag: ${SHA}|" "$f"
          done
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(gitops): bump image tags to ${{ github.event.workflow_run.head_sha || github.sha }}"
