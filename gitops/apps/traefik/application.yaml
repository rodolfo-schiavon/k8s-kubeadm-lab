apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: k8s-kubeadm-lab
    platform.layer: foundation
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: "33.x.x"
    helm:
      releaseName: traefik
      valuesObject:
        deployment:
          kind: Deployment
          replicas: 1
        nodeSelector:
          node-role: worker-app
        service:
          type: NodePort
        ports:
          web:
            port: 80
            nodePort: 30080
          websecure:
            port: 443
            nodePort: 30443
        ingressClass:
          enabled: true
          isDefaultClass: true
        providers:
          kubernetesIngress:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
