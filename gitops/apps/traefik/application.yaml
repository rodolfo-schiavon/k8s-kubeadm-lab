apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: k8s-kubeadm-lab
    platform.layer: foundation
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: "33.x.x"
    helm:
      releaseName: traefik
      valuesObject:
        deployment:
          kind: DaemonSet
        updateStrategy:
          rollingUpdate:
            maxUnavailable: 1
            maxSurge: 0
        nodeSelector:
          node-role: worker-app
        hostNetwork: true
        podSecurityContext:
          runAsUser: 0
          runAsNonRoot: false
        securityContext:
          allowPrivilegeEscalation: true
          readOnlyRootFilesystem: false
          capabilities:
            add:
              - NET_BIND_SERVICE
        ports:
          web:
            port: 80
            hostPort: 80
          websecure:
            port: 443
            hostPort: 443
        ingressClass:
          enabled: true
          isDefaultClass: true
        providers:
          kubernetesIngress:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
